server:
  port: 9000

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: trace
    org.springframework.security.jackson2: INFO

spring:
  security:
    oauth2:
      authorizationserver:
        issuer: http://${LOCAL_IP:localhost}:9000

app:
  wallet-attestation:
    trusted-issuers:
      - http://${LOCAL_IP:localhost}:9001/wp
    max-pop-age-seconds: 300
    max-wia-age-seconds: 86400
    trust-validator:
      enabled: true
      url: http://localhost:8090
  require-consent: true
  extra-redirect-uris: ""

---
spring:
  config:
    activate:
      on-profile: cloud

  security:
    oauth2:
      authorizationserver:
        issuer: https://vc-auth-server.onrender.com

app:
  wallet-attestation:
    trusted-issuers:
      - https://wallet-provider.onrender.com/wp
    max-pop-age-seconds: 900  # Allow up to 15 min skew (Render server clock drift vs device)
    max-wia-age-seconds: 86400
    trust-validator:
      enabled: true
      url: https://trust-validator.onrender.com
  require-consent: true
  extra-redirect-uris: "https://www.certification.openid.net/test/a/kmandalas-pda1-issuer/callback"
