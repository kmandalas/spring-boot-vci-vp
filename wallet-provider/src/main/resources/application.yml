server:
  port: 9001

spring:
  application:
    name: wallet-provider

  ssl:
    bundle:
      pem:
        wp-signing:
          keystore:
            certificate: classpath:wp_cert.pem
            private-key: classpath:wp_key.pem

  datasource:
    url: jdbc:postgresql://localhost:5432/eudi?currentSchema=wp
    username: eudi
    password: eudi

  sql:
    init:
      mode: always

namastack:
  outbox:
    polling:
      fixed:
        interval: 2000
      batch-size: 10

firebase:
  app-check:
    enabled: false
    project-number: ${FIREBASE_PROJECT_NUMBER:}
    app-id: ${FIREBASE_APP_ID:}

wp:
  metadata:
    endpoints:
      issuer: http://${LOCAL_IP:localhost}:9001/wp
      credential: http://${LOCAL_IP:localhost}:9001/wp/wua/credential
      jwks: http://${LOCAL_IP:localhost}:9001/wp/.well-known/jwks.json
      status-list: http://${LOCAL_IP:localhost}:9001/wp/.well-known/status-list
    claims:
      audience: http://${LOCAL_IP:localhost}:9001/wp
      iss: http://${LOCAL_IP:localhost}:9001/wp
    provider:
      id: demo.wallet.provider
      name: Demo Wallet Provider
      solution-version: 1.0.0
      certification-information: "N/A"  # TS3: wallet_solution_certification_information
      client-id: wallet-dev              # TS3: sub claim (OAuth client ID)
      wscd-certification-information: "N/A"  # TS3: wscd_certification_information
    time:
      nonce-ttl-seconds: 300
      max-proof-age-seconds: 300
      wua-ttl-seconds: 86400
      wia-ttl-seconds: 86400
  attestation:
    # Set to true to skip Google root CA validation (for emulator testing)
    skip-chain-validation: true
  qtsp:
    enabled: true
    trusted-issuers:
      - http://localhost:9003
    trust-validator-enabled: true
    trust-validator-url: http://localhost:8090
  admin-api:
    enabled: true
    api-key: ${WP_ADMIN_API_KEY:changeme-admin-key}

---
spring:
  config:
    activate:
      on-profile: cloud

  datasource:
    url: ${DB_URL}&currentSchema=wp
    username: ${DB_USER:eudi}
    password: ${DB_PASSWORD}

firebase:
  app-check:
    enabled: true

wp:
  metadata:
    endpoints:
      issuer: https://wallet-provider.onrender.com/wp
      credential: https://wallet-provider.onrender.com/wp/wua/credential
      jwks: https://wallet-provider.onrender.com/wp/.well-known/jwks.json
      status-list: https://wallet-provider.onrender.com/wp/.well-known/status-list
    claims:
      audience: https://wallet-provider.onrender.com/wp
      iss: https://wallet-provider.onrender.com/wp
    time:
      max-proof-age-seconds: 900  # Allow up to 15 min skew (Render server clock drift)
  qtsp:
    enabled: true
    trusted-issuers:
      - https://qtsp-mock.onrender.com
    trust-validator-enabled: true
    trust-validator-url: https://trust-validator.onrender.com
  attestation:
    # Production: should always validate certificate chain
    skip-chain-validation: true
