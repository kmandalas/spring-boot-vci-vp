<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" type="text/css"
          href="../static/css/style.css"
          th:href="@{/css/style.css}">
    <script src="https://unpkg.com/htmx.org@2.0.4"
            th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <title>K-Wallet Verifier</title>
</head>
<body>

<header class="kw-header">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <img class="kw-logo"
                 src="../static/img/k-wallet-logo.png"
                 th:src="@{/img/k-wallet-logo.png}"
                 alt="K-Wallet Verifier"/>
            <div>
                <h1>Verifier</h1>
                <p class="kw-subtitle">Request and verify Verifiable Presentations from EUDI wallets.</p>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="kw-card mb-4">
            <form id="presentation-form">
                <div class="mb-3">
                    <label for="credentialType" class="form-label">Credential type</label>
                    <select class="form-select" id="credentialType" name="credentialType">
                        <option value="pda1" selected>Portable Document A1</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Format</label>
                    <div class="kw-radio-group">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format"
                                   id="formatSdJwt" value="dc+sd-jwt" checked>
                            <label class="form-check-label" for="formatSdJwt">SD-JWT</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format"
                                   id="formatMdoc" value="mso_mdoc">
                            <label class="form-check-label" for="formatMdoc">mDoc</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-center justify-content-md-end">
                    <button type="button" class="btn btn-kw-primary"
                            hx-get="/verifier/qr-fragment"
                            hx-include="[name='format']"
                            hx-target="#qr-result"
                            hx-swap="innerHTML"
                            hx-indicator="#submit-spinner"
                            id="requestBtn">
                        <span class="htmx-hide-on-request">Request Presentation</span>
                        <span class="htmx-indicator">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                            Loading...
                        </span>
                    </button>
                </div>
            </form>
        </div>

        <div id="qr-result">
            <!-- HTMX will swap the QR fragment here -->
        </div>
    </div>
</main>

<footer class="kw-footer">
    <div class="container">
        K-Wallet Verifier &middot; <a href="https://github.com/kmandalas/spring-boot-vci-vp">spring-boot-vci-vp</a>
    </div>
</footer>

<script type="application/javascript"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        th:src="@{/webjars/bootstrap/js/bootstrap.min.js}">
</script>
</body>
</html>
