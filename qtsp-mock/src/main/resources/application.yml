server:
  port: 9003

spring:
  application:
    name: qtsp-mock

  datasource:
    url: jdbc:postgresql://localhost:5432/eudi?currentSchema=qtsp
    username: eudi
    password: eudi

  sql:
    init:
      mode: always

  ssl:
    bundle:
      pem:
        qtsp-ca:
          keystore:
            certificate: classpath:qtsp_ca_cert.pem
            private-key: classpath:qtsp_ca_key.pem

qtsp:
  api-key: qtsp-demo-api-key
  sad-ttl-seconds: 300

---
spring:
  config:
    activate:
      on-profile: cloud

  datasource:
    url: ${DB_URL}&currentSchema=qtsp
    username: ${DB_USER:eudi}
    password: ${DB_PASSWORD}

qtsp:
  api-key: ${QTSP_API_KEY:qtsp-demo-api-key}
