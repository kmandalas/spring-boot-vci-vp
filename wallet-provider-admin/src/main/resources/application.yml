server:
  port: 9004

spring:
  application:
    name: wallet-provider-admin

  datasource:
    url: jdbc:postgresql://localhost:5432/eudi?currentSchema=wpadmin
    username: eudi
    password: eudi

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-admin.sql

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# Admin application configuration
admin:
  totp:
    issuer: "WUA Admin Console"

# Wallet-provider connection (event polling + revocation commands)
wallet-provider:
  base-url: http://localhost:9001
  api-key: ${WP_ADMIN_API_KEY:changeme-admin-key}
  poll-interval-seconds: 5

logging:
  level:
    com.example.wpadm: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: cloud

  datasource:
    url: ${DB_URL}&currentSchema=wpadmin
    username: ${DB_USER:eudi}
    password: ${DB_PASSWORD}

wallet-provider:
  base-url: https://wallet-provider.onrender.com
